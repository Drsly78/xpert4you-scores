<style>
:root{
  --blue:#1467B8; --blue-dark:#0C4A8C; --blue-deep:#083461;
  --ink:#122641; --muted:#5C7089;
  --bg:#EEF3F9; --card:#FFFFFF; --line:#D9E4F0;
  --ok:#17A366; --bad:#E03E3E; --gold:#F2A81D;
  --radius:16px;
  --shadow:0 2px 10px rgba(12,74,140,.10);
  --skew:-7deg;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:"Archivo","Segoe UI",system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100dvh;
}
#app{max-width:520px;margin:0 auto;min-height:100dvh}
.screen{padding:0 14px calc(28px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:12px}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none;padding:0}
button:disabled{opacity:.38;cursor:default}
:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:6px}

/* ---------- Barre haute ---------- */
.topbar{
  position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;
  margin:0 -14px 4px;padding:10px 12px calc(10px);
  padding-top:calc(10px + env(safe-area-inset-top));
  background:linear-gradient(115deg,var(--blue-deep) 0%,var(--blue) 78%);
  color:#fff;box-shadow:var(--shadow);
}
.topbar::after{
  content:"";position:absolute;right:-18px;top:-30%;width:70px;height:160%;
  background:rgba(255,255,255,.10);transform:skewX(var(--skew));pointer-events:none;
}
.topbar-title{
  flex:1;margin:0;font-family:"Archivo Black","Archivo",sans-serif;
  font-size:1.05rem;letter-spacing:.4px;text-transform:uppercase;font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-right{display:flex;gap:6px;position:relative;z-index:1}
.iconbtn{
  width:40px;height:40px;min-width:40px;border-radius:12px;display:inline-flex;
  align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;
  background:rgba(255,255,255,.16);color:#fff;
}
.iconbtn.ghost{background:transparent;pointer-events:none}
.iconbtn.danger{background:#FBE4E4;color:var(--bad);width:34px;height:34px;min-width:34px;font-size:.85rem}

/* ---------- Accueil ---------- */
.home .hero{text-align:center;padding:26px 8px 6px}
.logo{width:min(66%,300px);height:auto;display:block;margin:0 auto}
.tagline{color:var(--muted);font-weight:600;font-size:.9rem;margin:12px 0 0}
.game-cards{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.game-card{
  display:flex;align-items:center;gap:14px;text-align:left;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;border:1.5px solid var(--line);
  transition:transform .12s ease, border-color .12s ease;
}
.game-card:active{transform:scale(.985)}
.gc-icon{width:52px;height:52px;min-width:52px;color:var(--blue);display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#E4EEFA,#F2F7FD);border-radius:14px;transform:skewX(var(--skew))}
.gc-icon svg{width:34px;height:34px;transform:skewX(calc(var(--skew) * -1))}
.gc-body{flex:1;display:flex;flex-direction:column;gap:2px}
.gc-title{font-family:"Archivo Black","Archivo",sans-serif;font-size:1.15rem;text-transform:uppercase;font-style:italic;letter-spacing:.3px;color:var(--blue-deep)}
.gc-sub{color:var(--muted);font-size:.82rem;font-weight:600}
.gc-arrow{color:var(--blue);font-weight:900;font-size:1.1rem}

.section-title{
  font-family:"Archivo Black","Archivo",sans-serif;font-size:.82rem;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--blue-dark);margin:10px 0 0;font-style:italic;
  display:flex;align-items:center;gap:8px;
}
.section-title::before{content:"";width:14px;height:3px;background:var(--gold);transform:skewX(var(--skew))}
.section-title .hint{font-family:"Archivo",sans-serif;font-style:normal;text-transform:none;letter-spacing:0;color:var(--muted);font-weight:600}
.hint{color:var(--muted);font-size:.8rem;font-weight:600}
.hint.center{text-align:center;margin:2px 0 0}

/* ---------- Historique accueil ---------- */
.hist-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.hist-item{
  display:grid;grid-template-columns:1fr auto;grid-template-areas:"g d" "w d";
  background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:9px 12px;gap:1px 8px;
}
.hist-game{grid-area:g;font-size:.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.hist-winner{grid-area:w;font-weight:800;color:var(--ink)}
.hist-date{grid-area:d;align-self:center;color:var(--muted);font-size:.78rem;font-weight:600}

/* ---------- Boutons / puces ---------- */
.btn{
  border-radius:14px;padding:13px 18px;font-weight:800;font-size:1rem;text-align:center;
  transition:transform .1s ease;
}
.btn:active:not(:disabled){transform:scale(.97)}
.btn.primary{background:linear-gradient(115deg,var(--blue-dark),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(20,103,184,.35)}
.btn.big{padding:16px 18px;font-size:1.08rem;text-transform:uppercase;font-style:italic;letter-spacing:.5px;font-family:"Archivo Black","Archivo",sans-serif;margin-top:6px}
.ghost-btn{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:13px 18px;font-weight:700;color:var(--blue-dark)}
.small-btn{padding:9px 14px;font-size:.88rem;align-self:flex-start}
.danger-btn{background:#FBE4E4;color:var(--bad);border-radius:14px;padding:13px 18px;font-weight:800}

.chips-row{display:flex;gap:8px;flex-wrap:wrap}
.chips-row.tabs{margin-top:4px}
.chip{
  background:var(--card);border:1.5px solid var(--line);border-radius:999px;
  padding:9px 15px;font-weight:700;font-size:.9rem;color:var(--ink);
  transition:all .12s ease;
}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 3px 8px rgba(20,103,184,.3)}
.chip.small{padding:6px 12px;font-size:.82rem}
.chip.mult.active{background:var(--gold);border-color:var(--gold);color:var(--blue-deep)}

/* ---------- Cartes / formulaires ---------- */
.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.card.padless{padding:10px}
.input{
  width:100%;border:1.5px solid var(--line);border-radius:12px;background:#F7FAFD;
  padding:12px 13px;font:inherit;font-weight:600;color:var(--ink);
}
.input:focus{outline:none;border-color:var(--blue);background:#fff}
.team-cfg{display:flex;flex-direction:column;gap:8px;border-left:5px solid var(--tc)}
.team-name{font-weight:800;font-size:1.02rem}
.addbox{display:flex;gap:8px}
.addbox .input{flex:1}
.addbox .btn{white-space:nowrap}
.roster{display:flex;flex-direction:column;gap:6px}
.roster-label{font-size:.78rem;font-weight:700;color:var(--muted)}
.chips-row.wrap{gap:6px}
.empty-note{color:var(--muted);font-weight:600;font-size:.9rem;text-align:center;background:var(--card);border:1.5px dashed var(--line);border-radius:12px;padding:14px;margin:0}

.player-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.player-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:8px 10px}
.pi-order{
  width:26px;height:26px;min-width:26px;border-radius:8px;background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.82rem;
  transform:skewX(var(--skew));font-style:italic;
}
.pi-name{flex:1;font-weight:700}

/* ---------- Match : communs ---------- */
.turnbox{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-left:5px solid var(--gold)}
.turn-label{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;color:var(--muted);display:block}
.turn-name{font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;font-size:1.3rem;color:var(--blue-deep);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.turn-score{margin-left:auto;font-weight:900;color:var(--blue);font-size:1.05rem;white-space:nowrap}

.toast{
  position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);z-index:60;
  background:var(--blue-deep);color:#fff;font-weight:700;padding:12px 18px;border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:all .25s ease;
  max-width:88vw;text-align:center;font-size:.92rem;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.bad{background:var(--bad)}

/* ---------- Pétanque ---------- */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.team-panel{display:flex;flex-direction:column;align-items:center;gap:4px;border-top:5px solid var(--tc);padding:12px 8px}
.team-panel.winning{box-shadow:0 0 0 3px var(--gold), var(--shadow)}
.team-name-lbl{font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;text-transform:uppercase;font-size:.95rem;color:var(--tc);text-align:center;letter-spacing:.3px;word-break:break-word}
.team-members{font-size:.72rem;color:var(--muted);font-weight:600;text-align:center}
.bigscore{
  font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;font-size:4.2rem;line-height:1;
  color:var(--ink);margin:6px 0 0;transform:skewX(var(--skew));
}
.team-goal{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.ptbtns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.ptbtn{
  width:44px;height:44px;border-radius:12px;background:#EAF2FB;color:var(--blue-dark);
  font-weight:900;font-size:1.02rem;border:1.5px solid var(--line);
}
.ptbtn:active:not(:disabled){background:var(--blue);color:#fff}
.mene-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.mene-list li{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:8px 12px}
.mene-no{font-size:.78rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;min-width:64px}
.mene-team{flex:1;font-weight:800}
.mene-pts{font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;color:var(--ink)}
.fanny{
  font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;color:var(--gold);
  font-size:1.6rem;letter-spacing:1px;margin-top:6px;animation:pop .5s ease;
}

/* ---------- Mölkky ---------- */
.pinboard{display:flex;flex-direction:column;gap:10px;align-items:center}
.pin-help{font-weight:600;color:var(--muted);font-size:.9rem;text-align:center}
.pin-row{display:flex;gap:8px;justify-content:center}
.pin{
  width:52px;height:58px;border-radius:12px 12px 16px 16px;border:2px solid var(--line);
  background:linear-gradient(180deg,#FDF6EC,#F3E4CB);color:#7A5A2E;font-weight:900;font-size:1.15rem;
  box-shadow:inset 0 -3px 0 rgba(122,90,46,.18);transition:all .1s ease;
}
.pin.sel{background:linear-gradient(180deg,var(--blue),var(--blue-dark));border-color:var(--blue-dark);color:#fff;transform:rotate(-8deg) translateY(3px);box-shadow:none}
.pin-actions{display:flex;gap:10px;width:100%}
.pin-actions .btn{flex:1}
.mk-board{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.mk-player{
  display:grid;grid-template-columns:1fr auto auto;grid-template-areas:"n m s" "l l s";
  align-items:center;gap:2px 10px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:9px 12px;
}
.mk-player.current{border-color:var(--blue);box-shadow:0 0 0 2px rgba(20,103,184,.25)}
.mk-player.won{border-color:var(--gold);box-shadow:0 0 0 2px rgba(242,168,29,.4)}
.mk-player.out{opacity:.5}
.mk-name{grid-area:n;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mk-name em{font-style:normal;font-size:.72rem;color:var(--bad);font-weight:800;text-transform:uppercase;margin-left:4px}
.mk-score{grid-area:s;font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;font-size:1.7rem;color:var(--blue-deep)}
.mk-left{grid-area:l;font-size:.74rem;color:var(--muted);font-weight:700}
.missdots{grid-area:m;display:flex;gap:4px}
.missdots i{width:9px;height:9px;border-radius:50%;background:var(--line)}
.missdots i.on{background:var(--bad)}
.mk-log{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px;font-size:.88rem;color:var(--muted);font-weight:600}
.mk-log b{color:var(--ink)}

/* ---------- Fléchettes ---------- */
.x01top{justify-content:space-between}
.x01-remaining{font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;font-size:3.4rem;line-height:1;color:var(--blue-deep);transform:skewX(var(--skew))}
.dartrow{display:flex;gap:8px;justify-content:center}
.dartchip{
  min-width:74px;text-align:center;padding:8px 10px;border-radius:10px;background:var(--card);
  border:1.5px dashed var(--line);font-weight:800;color:var(--muted);
}
.dartchip.filled{border-style:solid;border-color:var(--blue);color:var(--blue-deep);background:#EAF2FB}
.finish-hint{
  background:#E7F6EE;border:1.5px solid #BEE5D0;color:#0E7A4C;border-radius:12px;
  padding:10px 13px;font-weight:700;font-size:.92rem;text-align:center;
}
.finish-hint.warn{background:#FDF3DF;border-color:#F0DCAE;color:#8A6413}
.mult-row{display:flex;gap:8px;padding:4px 4px 10px;justify-content:center}
.numgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.numbtn{
  height:52px;border-radius:12px;background:#EAF2FB;border:1.5px solid var(--line);
  font-weight:900;font-size:1.05rem;color:var(--blue-dark);display:flex;flex-direction:column;
  align-items:center;justify-content:center;line-height:1.05;
}
.numbtn small{font-size:.62rem;font-weight:700;color:var(--muted)}
.numbtn:active:not(:disabled){background:var(--blue);color:#fff}
.numbtn.bull{background:#FDF3DF;border-color:#F0DCAE;color:#8A6413}
.numbtn.miss{background:#FBE4E4;border-color:#F2C7C7;color:var(--bad)}
.cricket-grid{grid-template-columns:repeat(4,1fr)}
.x01-board{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.x01-player{
  display:grid;grid-template-columns:1fr auto;grid-template-areas:"n s" "l s";
  gap:1px 10px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:9px 12px;align-items:center;
}
.x01-player.current{border-color:var(--blue);box-shadow:0 0 0 2px rgba(20,103,184,.25)}
.x01-player.won{border-color:var(--gold);box-shadow:0 0 0 2px rgba(242,168,29,.4)}
.xp-name{grid-area:n;font-weight:800}
.xp-last{grid-area:l;font-size:.74rem;color:var(--muted);font-weight:600}
.xp-score{grid-area:s;font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;font-size:1.8rem;color:var(--blue-deep)}

.table-wrap{overflow-x:auto}
.cric-table{width:100%;border-collapse:collapse;font-weight:700}
.cric-table th,.cric-table td{padding:9px 6px;text-align:center;border-bottom:1px solid var(--line);font-size:.95rem}
.cric-table thead th{font-size:.8rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.cric-table thead th.cur{color:var(--blue);border-bottom:3px solid var(--blue)}
.cric-num{font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;color:var(--blue-deep)}
.cric-table td{font-size:1.15rem;color:var(--ink)}
.cric-table td.closed{color:var(--ok)}
.cric-pts th{color:var(--muted);text-transform:uppercase;font-size:.75rem;letter-spacing:.6px}
.cric-pts td{font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;color:var(--blue-deep)}

.clock-target{display:flex;flex-direction:column;align-items:center;gap:2px;border-top:5px solid var(--gold)}
.ct-label{font-size:.74rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;color:var(--muted)}
.ct-num{font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;font-size:4.6rem;line-height:1;color:var(--blue-deep);transform:skewX(var(--skew))}
.clock-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.clock-actions.four{grid-template-columns:1fr 1fr}
.clock-actions .btn{padding:16px 10px}

/* ---------- Règles ---------- */
.rules-body{font-size:.95rem;line-height:1.55}
.rules-body h3{
  font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;text-transform:uppercase;
  font-size:.9rem;letter-spacing:.6px;color:var(--blue-dark);margin:16px 0 6px;
}
.rules-body h3:first-child{margin-top:2px}
.rules-body p,.rules-body ul,.rules-body ol{margin:0 0 8px}
.rules-body ul,.rules-body ol{padding-left:20px}
.rules-body li{margin-bottom:5px}

/* ---------- Victoire ---------- */
.win-overlay{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,rgba(8,52,97,.96),rgba(20,103,184,.94));
  padding:20px;animation:fade .3s ease;
}
.win-box{
  width:100%;max-width:400px;background:#fff;border-radius:22px;padding:28px 22px;
  display:flex;flex-direction:column;gap:10px;text-align:center;animation:pop .35s ease;
  max-height:88dvh;overflow:auto;
}
.win-icon{width:74px;height:74px;margin:0 auto;color:var(--gold)}
.win-icon svg{width:100%;height:100%}
.win-sub{font-size:.8rem;text-transform:uppercase;letter-spacing:2px;font-weight:800;color:var(--muted)}
.win-name{
  font-family:"Archivo Black","Archivo",sans-serif;font-style:italic;font-size:2rem;line-height:1.1;
  color:var(--blue-deep);word-break:break-word;
}
.win-detail{color:var(--muted);font-weight:700;margin-bottom:8px}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}

@media (min-width:430px){
  .pin{width:58px;height:64px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}


/* ==========================================================
   UI PRO + MOBILE STABILITY PASS
   Ameliorations ajoutees : rendu premium, confort tactile,
   anti-debordement horizontal, safe areas iOS/Android.
   ========================================================== */
:root{
  --blue:#0F6FD0;
  --blue-dark:#0A4E9D;
  --blue-deep:#062B55;
  --ink:#0D1B2F;
  --muted:#64758B;
  --bg:#EAF0F7;
  --card:rgba(255,255,255,.92);
  --line:rgba(118,145,178,.24);
  --ok:#12A66A;
  --bad:#E04646;
  --gold:#F4B432;
  --radius:22px;
  --shadow:0 16px 38px rgba(8,52,97,.12), 0 2px 8px rgba(8,52,97,.08);
  --shadow-soft:0 10px 28px rgba(8,52,97,.10);
  --pad:clamp(14px,4vw,22px);
}
html{
  width:100%;
  min-width:320px;
  overflow-x:hidden;
  overscroll-behavior-x:none;
  scroll-behavior:smooth;
  background:var(--bg);
  -webkit-text-size-adjust:100%;
  touch-action:manipulation;
}
body{
  width:100%;
  min-width:320px;
  overflow-x:hidden;
  overscroll-behavior-x:none;
  background:
    radial-gradient(circle at 20% -10%, rgba(20,103,184,.24), transparent 34%),
    radial-gradient(circle at 100% 10%, rgba(244,180,50,.18), transparent 28%),
    linear-gradient(180deg,#F7FAFE 0%,#EAF0F7 46%,#E4ECF6 100%);
  color:var(--ink);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:
    linear-gradient(120deg, transparent 0 70%, rgba(255,255,255,.45) 70% 71%, transparent 71% 100%),
    radial-gradient(circle at 50% 100%, rgba(10,78,157,.10), transparent 38%);
}
#app{
  width:min(100%,520px);
  max-width:520px;
  margin:0 auto;
  min-height:100svh;
  overflow-x:clip;
  position:relative;
  isolation:isolate;
}
.screen{
  width:100%;
  min-width:0;
  padding:0 var(--pad) calc(30px + env(safe-area-inset-bottom));
  gap:14px;
  overflow-x:clip;
}
.topbar{
  margin:0 calc(var(--pad) * -1) 10px;
  padding:12px var(--pad) 14px;
  padding-top:calc(12px + env(safe-area-inset-top));
  min-height:calc(62px + env(safe-area-inset-top));
  background:
    linear-gradient(135deg, rgba(6,43,85,.98), rgba(10,78,157,.98) 58%, rgba(15,111,208,.96)),
    radial-gradient(circle at 20% 0, rgba(255,255,255,.28), transparent 35%);
  box-shadow:0 12px 30px rgba(6,43,85,.24);

  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.14);
  overflow:hidden;
}
.topbar::before{
  content:"";
  position:absolute;
  inset:auto 18px 0 18px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
}
.topbar::after{

  background:linear-gradient(90deg,rgba(255,255,255,.16),rgba(255,255,255,.03));

  padding:calc(18px + env(safe-area-inset-top)) var(--pad) calc(18px + env(safe-area-inset-bottom));
  background:
    radial-gradient(circle at 50% 0,rgba(244,180,50,.22),transparent 34%),
    linear-gradient(150deg,rgba(6,43,85,.98),rgba(15,111,208,.94));
}
.win-box{
  border-radius:28px;
  box-shadow:0 28px 60px rgba(0,0,0,.28);
}
.toast{
  bottom:calc(24px + env(safe-area-inset-bottom));
  width:max-content;
  max-width:calc(100vw - 32px);
  border-radius:18px;
}
button,
input,
textarea,
select{
  -webkit-user-select:none;
  user-select:none;
}
input,textarea{
  -webkit-user-select:text;
  user-select:text;
}
img,svg,canvas,video{
  max-width:100%;
}
@media (max-width:390px){
  :root{--pad:12px}
  .topbar{gap:6px}
  .iconbtn{width:38px;height:38px;min-width:38px;border-radius:13px}
  .game-card{gap:11px;padding:15px}
  .gc-icon{width:50px;height:50px;min-width:50px}
  .gc-sub{font-size:.78rem}
  .duo{gap:9px}
  .team-panel{padding:12px 7px}
  .ptbtns{gap:5px}
  .addbox{flex-direction:column}
  .addbox .btn{width:100%}
  .pin-actions{flex-direction:column}
  .numgrid{grid-template-columns:repeat(4,1fr)}
  .cricket-grid{grid-template-columns:repeat(4,1fr)}
  .clock-actions,.clock-actions.four{grid-template-columns:1fr}
  .hist-item{grid-template-columns:1fr;grid-template-areas:"g" "w" "d"}
  .hist-date{justify-self:start;margin-top:3px}
}
@media (max-width:340px){
  html{font-size:15px}
  .topbar-title{font-size:.82rem}
  .gc-icon{display:none}
  .numgrid{grid-template-columns:repeat(3,1fr)}
}
@media (hover:none){
  .game-card:hover{border-color:var(--line);box-shadow:var(--shadow)}
}
@supports not (overflow:clip){
  #app,.screen{overflow-x:hidden}
}

</style>

/* ==================== STOCKAGE (repli mémoire si localStorage indisponible) ==================== */
const store = {
  mem: {},
  get(k, d){ try{ const v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); }catch(e){ return (k in this.mem) ? this.mem[k] : d; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ this.mem[k] = v; } }
};

function saveRosterNames(names){
  let changed = false;
  names.map(n => String(n).trim()).filter(Boolean).forEach(n => {
    if(!S.roster.some(r => r.toLowerCase() === n.toLowerCase())){ S.roster.push(n); changed = true; }
  });
  if(changed){ S.roster = S.roster.slice(-24); store.set('x4y_roster', S.roster); }
}
function pushHistory(entry){
  S.history.unshift(Object.assign({ date: Date.now() }, entry));
  S.history = S.history.slice(0, 8);
  store.set('x4y_history', S.history);
}
function snap(){ S.undo.push(clone(S.match)); if(S.undo.length > 40) S.undo.shift(); }
function shuffle(a){ for(let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

let toastTimer = null;
function toast(msg, kind){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (kind ? ' ' + kind : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2200);
}

function header(title, opts){
  opts = opts || {};
  return '<header class="topbar">' +
    (opts.back ? '<button class="iconbtn" aria-label="Retour" onclick="UI.back(\'' + opts.back + '\')">&#10094;</button>' : '<span class="iconbtn ghost"></span>') +
    '<h1 class="topbar-title">' + esc(title) + '</h1>' +
    '<span class="topbar-right">' + (opts.right || '<span class="iconbtn ghost"></span>') + '</span>' +
    '</header>';
}
function matchHeader(title, rulesTab){
  const undoDisabled = S.undo.length === 0 ? ' disabled' : '';
  return '<header class="topbar">' +
    '<button class="iconbtn" aria-label="Quitter la partie" onclick="UI.quitMatch()">&#10005;</button>' +
    '<h1 class="topbar-title">' + esc(title) + '</h1>' +
    '<span class="topbar-right">' +
    '<button class="iconbtn" aria-label="Règles" onclick="UI.openRules(\'' + rulesTab + '\',\'match\')">?</button>' +
    '<button class="iconbtn" aria-label="Annuler le dernier coup" onclick="UI.undoLast()"' + undoDisabled + '>&#8630;</button>' +
    '</span></header>';
}
function chip(label, active, onclick){
  return '<button class="chip' + (active ? ' active' : '') + '" onclick="' + onclick + '">' + label + '</button>';
}

function renderHome(){
  const hist = S.history.map(h => {
    const d = new Date(h.date);
    const dd = d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    return '<li class="hist-item"><span class="hist-game">' + esc(GAME_LABEL[h.game] || h.game) + '</span>' +
      '<span class="hist-winner">&#127942; ' + esc(h.winner) + '</span><span class="hist-date">' + dd + '</span></li>';
  }).join('');
  return '<div class="screen home">' +
    '<div class="hero"><img class="logo" src="' + LOGO_SRC + '" alt="Xpert 4You"><p class="tagline">Compteur de points &mdash; P&eacute;tanque &middot; M&ouml;lkky &middot; Fl&eacute;chettes</p></div>' +

  S.match = {

function molkkyTogglePin(n){
  const M = S.match;
  if(M.winner !== null) return;
  const i = M.sel.indexOf(n);
  if(i >= 0) M.sel.splice(i, 1); else M.sel.push(n);
  render();

function molkkyNext(){
  const M = S.match;
  let i = M.idx;
  for(let k = 0; k < M.players.length; k++){
    i = (i + 1) % M.players.length;
    if(!M.players[i].out) break;
  }
  M.idx = i;
}
function molkkyValidate(missed){
  const M = S.match;
  if(M.winner !== null) return;
  snap();
  const p = M.players[M.idx];
  const sel = missed ? [] : M.sel.slice();
  const pts = sel.length === 0 ? 0 : (sel.length === 1 ? sel[0] : sel.length);
  if(pts === 0){
    p.miss++;
    if(p.miss >= 3){
      if(M.missRule === 'elim'){ p.out = true; toast(p.name + ' est éliminé (3 lancers nuls) !', 'bad'); }
      else { p.score = 25; p.miss = 0; toast('3 lancers nuls → ' + p.name + ' retombe à 25', 'bad'); }
    }
  } else {
    p.miss = 0;
    p.score += pts;
    if(p.score > 50){ p.score = 25; toast('Plus de 50 ! ' + p.name + ' redescend à 25', 'bad'); }
    else if(p.score === 50){ M.winner = M.idx; }
  }
  M.log.unshift({ name: p.name, pts: pts });
  M.log = M.log.slice(0, 30);
  M.sel = [];
  if(M.winner === null){
    const alive = M.players.filter(q => !q.out);
    if(alive.length === 1 && M.players.length > 1){
      M.winner = M.players.indexOf(alive[0]);
    }
  }
  if(M.winner !== null){
    pushHistory({ game: 'molkky', winner: M.players[M.winner].name, detail: M.players[M.winner].score + ' pts' });
  } else {
    molkkyNext();
  }
  render();
}

/* ==================== MATCH : FLÉCHETTES X01 ==================== */
const DART_FINISH_THROWS = (function(){
  const t = [];
  for(let n = 20; n >= 1; n--){
    t.push({ l: 'T' + n, v: 3 * n, m: 3 });
    t.push({ l: 'D' + n, v: 2 * n, m: 2 });
    t.push({ l: n === 25 ? '' : 'S' + n, v: n, m: 1 });
  }
  t.push({ l: 'D-Bull', v: 50, m: 2 });
  t.push({ l: 'Bull', v: 25, m: 1 });
  t.sort((a, b) => b.v - a.v);
  return t;
})();
function canFinishWith(t, out){
  if(out === 'simple') return true;
  if(out === 'double') return t.m === 2;
  return t.m === 2 || t.m === 3; // master
}
function suggestFinish(score, dartsLeft, out){
  const minLeft = out === 'simple' ? 1 : 2;
  function search(rem, left, path){
    if(rem > 60 * left) return null;
    for(let i = 0; i < DART_FINISH_THROWS.length; i++){
      const t = DART_FINISH_THROWS[i];
      if(t.v === rem && canFinishWith(t, out)) return path.concat(t.l);
    }
    if(left <= 1) return null;
    for(let i = 0; i < DART_FINISH_THROWS.length; i++){
      const t = DART_FINISH_THROWS[i];
      if(rem - t.v >= minLeft){
        const r = search(rem - t.v, left - 1, path.concat(t.l));
        if(r) return r;
      }
    }
    return null;
  }
  if(score < minLeft || dartsLeft <= 0) return null;
  return search(score, dartsLeft, []);
}
function startX01(cfg){
  saveRosterNames(cfg.players);
  S.match = {
    game: 'darts', mode: 'x01', cfg0: clone(cfg),
    start: cfg.start, out: cfg.out, din: cfg.din,
    players: cfg.players.map(n => ({ name: n, score: cfg.start, entered: cfg.din !== 'double', thrown: 0, scored: 0, lastVolley: '–' })),
    idx: 0, darts: [], mult: 1, turnStart: cfg.start, winner: null
  };
  S.undo = [];
  go('match');
}
function x01Label(v, m){
  if(v === 0) return '0';
  if(v === 25) return m === 2 ? 'D-Bull' : 'Bull';
  return (m === 3 ? 'T' : m === 2 ? 'D' : '') + v;
}
function x01EndTurn(busted){
  const M = S.match;
  const p = M.players[M.idx];
  const volley = M.darts.map(d => x01Label(d.v, d.m)).join(' · ');
  p.lastVolley = busted ? 'BUST (' + volley + ')' : (volley || '–');
  M.darts = [];
  M.mult = 1;
  M.idx = (M.idx + 1) % M.players.length;
  M.turnStart = M.players[M.idx].score;
}
function x01Throw(v){
  const M = S.match;
  if(M.winner !== null) return;
  snap();
  const m = v === 0 ? 1 : M.mult;
  const p = M.players[M.idx];
  if(M.darts.length === 0){ M.turnStart = p.score; }
  M.darts.push({ v: v, m: m });
  p.thrown++;
  const pts = v * m;
  let counted = false;
  if(!p.entered){
    if(m === 2){ p.entered = true; counted = true; }
  } else {
    counted = true;
  }
  if(counted && pts > 0){
    p.score -= pts;
    p.scored += pts;
  }
  M.mult = 1;
  // fin de partie / bust
  if(p.score === 0 && counted){
    const ok = M.out === 'simple' || (M.out === 'double' && m === 2) || (M.out === 'master' && (m === 2 || m === 3));
    if(ok){
      M.winner = M.idx;
      pushHistory({ game: 'x01', winner: p.name, detail: M.start + ' · sortie ' + M.out });
      render();
      return;
    }
    p.score = M.turnStart; p.scored -= (M.turnStart - 0); // annule les points de la volée
    fixScored(p, M);
    toast('BUST ! Il faut finir sur ' + (M.out === 'double' ? 'un double' : 'un double ou un triple'), 'bad');
    x01EndTurn(true);
    render();
    return;
  }
  if(p.score < 0 || (p.score === 1 && M.out !== 'simple')){
    const diff = M.turnStart - p.score;
    p.score = M.turnStart; p.scored -= diff;
    toast('BUST ! Volée annulée', 'bad');
    x01EndTurn(true);
    render();
    return;
  }
  if(M.darts.length >= 3){
    x01EndTurn(false);
  }
  render();
}
function fixScored(p, M){ if(p.scored < 0) p.scored = 0; }
function renderX01Match(){
  const M = S.match;
  const cur = M.players[M.idx];
  const dartsChips = [0, 1, 2].map(i => {
    const d = M.darts[i];
    return '<span class="dartchip' + (d ? ' filled' : '') + '">' + (d ? x01Label(d.v, d.m) : '·') + '</span>';
  }).join('');
  const fin = M.winner === null ? suggestFinish(cur.score, 3 - M.darts.length, M.out) : null;
  const finHtml = fin ? '<div class="finish-hint">&#127919; Finish possible : <b>' + fin.join(' &rarr; ') + '</b></div>' :
    (M.din === 'double' && !cur.entered ? '<div class="finish-hint warn">Entrée double : touchez un double pour commencer à marquer</div>' : '');
  const players = M.players.map((p, i) => {
    const avg = p.thrown > 0 ? (p.scored / p.thrown * 3).toFixed(1) : '–';
    return '<li class="x01-player' + (i === M.idx && M.winner === null ? ' current' : '') + (M.winner === i ? ' won' : '') + '">' +
      '<span class="xp-name">' + esc(p.name) + '</span>' +
      '<span class="xp-last">Volée : ' + esc(p.lastVolley) + ' · Moy/3 : ' + avg + '</span>' +
      '<span class="xp-score">' + p.score + '</span></li>';
  }).join('');
  const multRow = '<div class="mult-row">' +
    [['1', 'Simple'], ['2', 'Double'], ['3', 'Triple']].map(mm =>
      '<button class="chip mult' + (M.mult === Number(mm[0]) ? ' active' : '') + '" onclick="UI.x01Mult(' + mm[0] + ')">' + mm[1] + '</button>'
    ).join('') + '</div>';
  let grid = '<div class="numgrid">';
  for(let n = 1; n <= 20; n++){
    grid += '<button class="numbtn" onclick="UI.x01Throw(' + n + ')" ' + (M.winner !== null ? 'disabled' : '') + '>' + n + '</button>';
  }
  const bullDisabled = M.winner !== null || M.mult === 3;
  grid += '<button class="numbtn bull" onclick="UI.x01Throw(25)" ' + (bullDisabled ? 'disabled' : '') + '>Bull<small>25</small></button>';
  grid += '<button class="numbtn miss" onclick="UI.x01Throw(0)" ' + (M.winner !== null ? 'disabled' : '') + '>Raté<small>0</small></button>';
  grid += '</div>';
  return '<div class="screen match">' +
    matchHeader((M.start) + ' · sortie ' + M.out, 'darts') +
    '<div class="card turnbox x01top"><div><span class="turn-label">Au tour de</span><span class="turn-name">' + esc(cur.name) + '</span></div>' +
    '<div class="x01-remaining">' + cur.score + '</div></div>' +
    '<div class="dartrow">' + dartsChips + '</div>' +
    finHtml +
    '<div class="card padless">' + multRow + grid + '</div>' +
    '<h2 class="section-title">Joueurs</h2><ul class="x01-board">' + players + '</ul>' +
    winnerOverlay() +
    '</div>';
}

/* ==================== MATCH : CRICKET ==================== */
const CRICKET_NUMS = [20, 19, 18, 17, 16, 15, 25];
function startCricket(cfg){
  saveRosterNames(cfg.players);
  const marks = {}; CRICKET_NUMS.forEach(n => marks[n] = 0);
  S.match = {
    game: 'darts', mode: 'cricket', cfg0: clone(cfg),
    players: cfg.players.map(n => ({ name: n, marks: clone(marks), pts: 0 })),
    idx: 0, dartNo: 0, mult: 1, winner: null
  };
  S.undo = [];
  go('match');
}
function cricketThrow(n){
  const M = S.match;
  if(M.winner !== null) return;
  snap();
  const p = M.players[M.idx];
  let m = n === 0 ? 1 : M.mult;
  if(n === 25 && m === 3) m = 2;
  if(n > 0){
    const before = p.marks[n];
    const after = Math.min(3, before + m);
    const overflow = Math.max(0, before + m - 3);
    p.marks[n] = after;
    if(overflow > 0){
      const someOpen = M.players.some((q, i) => i !== M.idx && q.marks[n] < 3);
      if(someOpen) p.pts += overflow * n;
    }
  }
  M.mult = 1;
  M.dartNo++;
  const allClosed = CRICKET_NUMS.every(k => p.marks[k] >= 3);
  if(allClosed && M.players.every((q, i) => i === M.idx || p.pts >= q.pts)){
    M.winner = M.idx;
    pushHistory({ game: 'cricket', winner: p.name, detail: p.pts + ' pts' });
    render();
    return;
  }
  if(M.dartNo >= 3){
    M.dartNo = 0;
    M.idx = (M.idx + 1) % M.players.length;
  }
  render();
}
const MARK_GLYPH = ['', '/', '\u2715', '\u29BB'];
function renderCricketMatch(){
  const M = S.match;
  const cur = M.players[M.idx];
  const headCols = M.players.map((p, i) => '<th class="' + (i === M.idx && M.winner === null ? 'cur' : '') + '">' + esc(p.name) + '</th>').join('');
  const rows = CRICKET_NUMS.map(n => {
    const cells = M.players.map(p => {
      const closed = p.marks[n] >= 3;
      return '<td class="' + (closed ? 'closed' : '') + '">' + (MARK_GLYPH[p.marks[n]] || '') + '</td>';
    }).join('');
    return '<tr><th class="cric-num">' + (n === 25 ? 'Bull' : n) + '</th>' + cells + '</tr>';
  }).join('');
  const ptsRow = '<tr class="cric-pts"><th>Points</th>' + M.players.map(p => '<td>' + p.pts + '</td>').join('') + '</tr>';
  const dartsLeft = 3 - M.dartNo;
  const multRow = '<div class="mult-row">' +
    [['1', 'Simple'], ['2', 'Double'], ['3', 'Triple']].map(mm =>
      '<button class="chip mult' + (M.mult === Number(mm[0]) ? ' active' : '') + '" onclick="UI.cricMult(' + mm[0] + ')">' + mm[1] + '</button>'
    ).join('') + '</div>';
  const btns = CRICKET_NUMS.map(n => {
    const dis = M.winner !== null || (n === 25 && M.mult === 3);
    return '<button class="numbtn" onclick="UI.cricThrow(' + n + ')" ' + (dis ? 'disabled' : '') + '>' + (n === 25 ? 'Bull' : n) + '</button>';
  }).join('') + '<button class="numbtn miss" onclick="UI.cricThrow(0)" ' + (M.winner !== null ? 'disabled' : '') + '>Raté</button>';
  return '<div class="screen match">' +
    matchHeader('Cricket', 'darts') +
    '<div class="card turnbox"><span class="turn-label">Au tour de</span><span class="turn-name">' + esc(cur.name) + '</span><span class="turn-score">' + dartsLeft + ' fléchette' + (dartsLeft > 1 ? 's' : '') + '</span></div>' +
    '<div class="card padless table-wrap"><table class="cric-table"><thead><tr><th></th>' + headCols + '</tr></thead><tbody>' + rows + ptsRow + '</tbody></table></div>' +
    '<div class="card padless">' + multRow + '<div class="numgrid cricket-grid">' + btns + '</div></div>' +
    winnerOverlay() +
    '</div>';
}

/* ==================== MATCH : TOUR DE L'HORLOGE ==================== */
function startClock(cfg){
  saveRosterNames(cfg.players);
  S.match = {
    game: 'darts', mode: 'clock', cfg0: clone(cfg), fast: cfg.fast, bull: cfg.bull,
    players: cfg.players.map(n => ({ name: n, target: 1 })),
    idx: 0, dartNo: 0, winner: null
  };
  S.undo = [];
  go('match');
}
function clockTargetLabel(t){ return t === 21 ? 'Bull' : String(t); }
function clockThrow(mult){ // 0 = raté, 1/2/3 = simple/double/triple
  const M = S.match;
  if(M.winner !== null) return;
  snap();
  const p = M.players[M.idx];
  if(mult > 0){
    const adv = M.fast ? mult : 1;
    p.target += adv;
    const end = M.bull ? 21 : 20;
    if(p.target > end){
      M.winner = M.idx;
      pushHistory({ game: 'clock', winner: p.name, detail: M.bull ? '1→20 + Bull' : '1→20' });
      render();
      return;
    }
  }
  M.dartNo++;
  if(M.dartNo >= 3){
    M.dartNo = 0;
    M.idx = (M.idx + 1) % M.players.length;
  }
  render();
}
function renderClockMatch(){
  const M = S.match;
  const cur = M.players[M.idx];
  const dartsLeft = 3 - M.dartNo;
  const isBullTarget = cur.target === 21;
  const players = M.players.map((p, i) =>
    '<li class="mk-player' + (i === M.idx && M.winner === null ? ' current' : '') + (M.winner === i ? ' won' : '') + '">' +
    '<span class="mk-name">' + esc(p.name) + '</span>' +
    '<span class="mk-score">' + clockTargetLabel(Math.min(p.target, M.bull ? 21 : 20)) + '</span>' +
    '<span class="mk-left">cible en cours</span></li>'
  ).join('');
  let btns;
  if(M.fast && !isBullTarget){
    btns = '<button class="btn danger-btn" onclick="UI.clockThrow(0)">Raté</button>' +
      '<button class="btn primary" onclick="UI.clockThrow(1)">Simple +1</button>' +
      '<button class="btn primary" onclick="UI.clockThrow(2)">Double +2</button>' +
      '<button class="btn primary" onclick="UI.clockThrow(3)">Triple +3</button>';
  } else {
    btns = '<button class="btn danger-btn" onclick="UI.clockThrow(0)">Raté</button>' +
      '<button class="btn primary" onclick="UI.clockThrow(1)">Touché !</button>';
  }
  return '<div class="screen match">' +
    matchHeader('Tour de l\u2019horloge' + (M.fast ? ' · rapide' : ''), 'darts') +
    '<div class="card turnbox"><span class="turn-label">Au tour de</span><span class="turn-name">' + esc(cur.name) + '</span><span class="turn-score">' + dartsLeft + ' fléchette' + (dartsLeft > 1 ? 's' : '') + '</span></div>' +
    '<div class="card clock-target"><span class="ct-label">Cible à toucher</span><span class="ct-num">' + clockTargetLabel(cur.target) + '</span></div>' +
    '<div class="clock-actions' + (M.fast && !isBullTarget ? ' four' : '') + '">' + btns + '</div>' +
    '<h2 class="section-title">Progression</h2><ul class="mk-board">' + players + '</ul>' +
    winnerOverlay() +
    '</div>';
}

/* ==================== FIN DE PARTIE ==================== */
function winnerName(){
  const M = S.match;
  if(M.winner === null) return '';
  return M.game === 'petanque' ? M.teams[M.winner].name : M.players[M.winner].name;
}
function winnerOverlay(){
  const M = S.match;
  if(!M || M.winner === null) return '';
  let detail = '';
  if(M.game === 'petanque'){
    detail = M.teams[0].score + ' &ndash; ' + M.teams[1].score + (M.fanny ? '<div class="fanny">FANNY&nbsp;!</div>' : '');
  } else if(M.game === 'molkky'){
    detail = '50 points, pile !';
  } else if(M.mode === 'x01'){
    detail = M.start + ' terminé · sortie ' + M.out;
  } else if(M.mode === 'cricket'){
    detail = 'Tout fermé · ' + M.players[M.winner].pts + ' pts';
  } else if(M.mode === 'clock'){
    detail = 'Parcours ' + (M.bull ? '1 &rarr; 20 + Bull' : '1 &rarr; 20') + ' bouclé';
  }
  return '<div class="win-overlay" role="dialog" aria-label="Fin de partie">' +
    '<div class="win-box">' +
    '<span class="win-icon">' + ICONS.trophy + '</span>' +
    '<div class="win-sub">Victoire</div>' +
    '<div class="win-name">' + esc(winnerName()) + '</div>' +
    '<div class="win-detail">' + detail + '</div>' +
    '<button class="btn primary big" onclick="UI.replay()">Rejouer &#8635;</button>' +
    '<button class="btn ghost-btn" onclick="UI.toConfig()">Modifier la partie</button>' +
    '<button class="btn ghost-btn" onclick="UI.home()">Accueil</button>' +
    '</div></div>';
}

/* ==================== DISPATCH RENDU ==================== */
function renderMatch(){
  const M = S.match;
  if(!M) { go('home'); return ''; }
  if(M.game === 'petanque') return renderPetMatch();
  if(M.game === 'molkky') return renderMolkkyMatch();
  if(M.mode === 'x01') return renderX01Match();
  if(M.mode === 'cricket') return renderCricketMatch();
  return renderClockMatch();
}
function render(){
  let html = '';
  if(S.screen === 'home') html = renderHome();
  else if(S.screen === 'rules') html = renderRules();
  else if(S.screen === 'cfg-petanque') html = renderPetConfig();
  else if(S.screen === 'cfg-molkky') html = renderMolkkyConfig();
  else if(S.screen === 'cfg-darts') html = renderDartsConfig();
  else if(S.screen === 'match') html = renderMatch();
  $app.innerHTML = html;
}

/* ==================== ACTIONS (exposées aux onclick) ==================== */
const UI = {
  back(to){ go(to === 'match' ? 'match' : to); },
  home(){ S.match = null; S.undo = []; go('home'); },
  openRules(tab, back){ S.rulesTab = tab; S.rulesBack = back === 'match' ? 'match' : back; go('rules'); },
  rulesTab(t){ S.rulesTab = t; render(); },

  openConfig(game){
    if(game === 'petanque'){ S.cfg = S.cfg && S.cfg.game === 'petanque' ? S.cfg : defaultPetCfg(); go('cfg-petanque'); }
    else if(game === 'molkky'){ S.cfg = S.cfg && S.cfg.game === 'molkky' ? S.cfg : defaultMolkkyCfg(); go('cfg-molkky'); }
    else { S.cfg = S.cfg && S.cfg.game === 'darts' ? S.cfg : defaultDartsCfg(); go('cfg-darts'); }
  },
  toConfig(){
    const M = S.match;
    if(!M) { go('home'); return; }
    S.cfg = clone(M.cfg0);
    S.match = null; S.undo = [];
    go(M.cfg0.game === 'petanque' ? 'cfg-petanque' : M.cfg0.game === 'molkky' ? 'cfg-molkky' : 'cfg-darts');
  },

  /* --- Pétanque config --- */
  petMode(m){ S.cfg.mode = m; render(); },
  petTarget(t){ S.cfg.target = t; render(); },
  petTeamName(i, v){ S.cfg.teamNames[i] = v; },
  petMember(t, p, v){ S.cfg.members[t][p] = v; },
  petRoster(i){
    const name = S.roster[i];
    const n = PET_MODES[S.cfg.mode].n;
    for(let t = 0; t < 2; t++){
      for(let p = 0; p < n; p++){
        if(!S.cfg.members[t][p].trim()){ S.cfg.members[t][p] = name; render(); return; }
      }
    }
    toast('Toutes les places sont remplies');
  },
  petStart(){ startPetanque(S.cfg); },
  petMene(t, p){ petAddMene(t, p); },

  /* --- Mölkky config --- */
  molkkyAdd(){
    const el = document.getElementById('newPlayer');
    const v = el.value.trim();
    if(!v){ el.focus(); return; }
    if(S.cfg.players.some(p => p.toLowerCase() === v.toLowerCase())){ toast('Ce nom est déjà dans la liste'); return; }
    if(S.cfg.players.length >= 16){ toast('16 joueurs maximum'); return; }
    S.cfg.players.push(v);
    render();
    const el2 = document.getElementById('newPlayer'); if(el2) el2.focus();
  },
  molkkyRemove(i){ S.cfg.players.splice(i, 1); render(); },
  molkkyRoster(i){
    const name = S.roster[i];
    if(S.cfg.players.some(p => p.toLowerCase() === name.toLowerCase())){ toast('Déjà dans la liste'); return; }
    if(S.cfg.players.length >= 16){ toast('16 joueurs maximum'); return; }
    S.cfg.players.push(name); render();
  },
  molkkyShuffle(){ shuffle(S.cfg.players); render(); },
  molkkyMissRule(r){ S.cfg.missRule = r; render(); },
  molkkyStart(){
    if(S.cfg.players.length < 2){ toast('Ajoutez au moins 2 joueurs'); return; }
    startMolkky(S.cfg);
  },
  mkPin(n){ molkkyTogglePin(n); },
  mkMiss(){ molkkyValidate(true); },
  mkValidate(){ molkkyValidate(false); },

  /* --- Fléchettes config --- */
  dartsMode(m){ S.cfg.mode = m; render(); },
  dartsStart(v){ S.cfg.start = v; render(); },
  dartsOut(o){ S.cfg.out = o; render(); },
  dartsIn(o){ S.cfg.din = o; render(); },
  dartsFast(b){ S.cfg.fast = b; render(); },
  dartsBull(b){ S.cfg.bull = b; render(); },
  dartsAdd(){
    const el = document.getElementById('newPlayer');
    const v = el.value.trim();
    if(!v){ el.focus(); return; }
    if(S.cfg.players.some(p => p.toLowerCase() === v.toLowerCase())){ toast('Ce nom est déjà dans la liste'); return; }
    if(S.cfg.players.length >= 8){ toast('8 joueurs maximum'); return; }
    S.cfg.players.push(v);
    render();
    const el2 = document.getElementById('newPlayer'); if(el2) el2.focus();
  },
  dartsRemove(i){ S.cfg.players.splice(i, 1); render(); },
  dartsRoster(i){
    const name = S.roster[i];
    if(S.cfg.players.some(p => p.toLowerCase() === name.toLowerCase())){ toast('Déjà dans la liste'); return; }
    if(S.cfg.players.length >= 8){ toast('8 joueurs maximum'); return; }
    S.cfg.players.push(name); render();
  },
  dartsShuffle(){ shuffle(S.cfg.players); render(); },
  dartsStartGame(){
    const c = S.cfg;
    const min = c.mode === 'cricket' ? 2 : 1;
    if(c.players.length < min){ toast('Ajoutez au moins ' + min + ' joueur' + (min > 1 ? 's' : '')); return; }
    if(c.mode === 'x01') startX01(c);
    else if(c.mode === 'cricket') startCricket(c);
    else startClock(c);
  },
  x01Mult(m){ S.match.mult = S.match.mult === m ? 1 : m; render(); },
  x01Throw(v){ x01Throw(v); },
  cricMult(m){ S.match.mult = S.match.mult === m ? 1 : m; render(); },
  cricThrow(n){ cricketThrow(n); },
  clockThrow(m){ clockThrow(m); },

  /* --- Commun match --- */
  undoLast(){
    if(!S.undo.length) return;
    S.match = S.undo.pop();
    render();
  },
  quitMatch(){
    if(S.match && S.match.winner === null && !confirm('Quitter la partie en cours ? Les scores seront perdus.')) return;
    UI.home();
  },
  replay(){
    const M = S.match;
    if(!M) return;
    const c = M.cfg0;
    if(c.game === 'petanque') startPetanque(c);
    else if(c.game === 'molkky') startMolkky(c);
    else if(c.mode === 'x01') startX01(c);
    else if(c.mode === 'cricket') startCricket(c);
    else startClock(c);
  }
};
window.UI = UI;

render();

window.S = S;
window.render = render;

</script>

<script>
(function(){
  const root = document.documentElement;
  function setAppViewport(){
    root.style.setProperty('--app-vh', (window.innerHeight * 0.01) + 'px');
  }
  setAppViewport();
  window.addEventListener('resize', setAppViewport, { passive:true });
  window.addEventListener('orientationchange', function(){ setTimeout(setAppViewport, 120); }, { passive:true });
  document.addEventListener('touchmove', function(e){
    if(document.documentElement.scrollWidth > window.innerWidth + 1){
      document.documentElement.scrollLeft = 0;
      document.body.scrollLeft = 0;
    }
  }, { passive:true });
})();
</script>
